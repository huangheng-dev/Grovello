name: Bug report
description: Report a reproducible Grovello defect.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: observed
    attributes: { label: Observed behavior }
    validations: { required: true }
  - type: textarea
    id: expected
    attributes: { label: Expected behavior }
    validations: { required: true }
  - type: textarea
    id: reproduce
    attributes: { label: Reproduction steps }
    validations: { required: true }
  - type: textarea
    id: environment
    attributes: { label: Environment and logs, with secrets removed }
