name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11.9.0
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm lint
      - run: pnpm build

  python:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        service: [api, workers]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: |
            services/${{ matrix.service }}/pyproject.toml
            services/${{ matrix.service }}/uv.lock
            services/api/pyproject.toml
            services/api/uv.lock
      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: '0.11.16'
      - name: Verify Python lock file
        working-directory: services/${{ matrix.service }}
        run: uv lock --check
      - run: python -m pip install --upgrade pip
      - if: matrix.service == 'workers'
        run: python -m pip install -e services/api
      - run: python -m pip install -e "services/${{ matrix.service }}[dev]"
      - run: ruff check "services/${{ matrix.service }}"
      - run: pytest "services/${{ matrix.service }}"

  compose:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - run: docker compose config --quiet
      - run: docker compose -f compose.yaml -f compose.platform.yaml --profile platform --profile scale config --quiet
