events { worker_connections 2048; }

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  server_tokens off;
  gzip on;
  gzip_types application/json application/javascript text/css text/plain;

  map $http_x_request_id $request_correlation_id {
    default $http_x_request_id;
    "" $request_id;
  }

  upstream grovello_web { server web:3000; keepalive 32; }
  upstream grovello_api { server api:8000; keepalive 32; }

  server {
    listen 8080;
    client_max_body_size 32m;

    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location /api/ {
      proxy_pass http://grovello_api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $request_correlation_id;
    }

    location / {
      proxy_pass http://grovello_web;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $request_correlation_id;
    }
  }
}
