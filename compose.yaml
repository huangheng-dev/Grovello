name: grovello

services:
  postgres:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-grovello}
      POSTGRES_USER: ${POSTGRES_USER:-grovello}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-grovello}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-grovello} -d ${POSTGRES_DB:-grovello}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  valkey:
    image: valkey/valkey:8-alpine
    command: ["valkey-server", "--appendonly", "yes", "--save", "60", "1000"]
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  temporal:
    image: temporalio/auto-setup:1.28.1
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-grovello}
      POSTGRES_PWD: ${POSTGRES_PASSWORD:-grovello}
      POSTGRES_SEEDS: postgres
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
    volumes:
      - ./infra/temporal/dynamicconfig:/etc/temporal/config/dynamicconfig:ro
    restart: unless-stopped

  temporal-ui:
    image: temporalio/ui:2.42.1
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:8080
    ports:
      - "8233:8080"
    restart: unless-stopped

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    environment:
      GROVELLO_ENVIRONMENT: development
      GROVELLO_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-grovello}:${POSTGRES_PASSWORD:-grovello}@postgres:5432/${POSTGRES_DB:-grovello}
      GROVELLO_VALKEY_URL: redis://valkey:6379/0
      GROVELLO_TEMPORAL_ADDRESS: temporal:7233
      GROVELLO_ALLOWED_ORIGINS: '["http://localhost:8080","http://localhost:3000"]'
      GROVELLO_OBJECT_STORAGE_ENDPOINT: ${GROVELLO_OBJECT_STORAGE_ENDPOINT:-http://object-storage:9000}
      GROVELLO_OBJECT_STORAGE_PUBLIC_ENDPOINT: ${GROVELLO_OBJECT_STORAGE_PUBLIC_ENDPOINT:-http://localhost:9000}
      GROVELLO_OBJECT_STORAGE_REGION: ${GROVELLO_OBJECT_STORAGE_REGION:-us-east-1}
      GROVELLO_OBJECT_STORAGE_BUCKET: ${GROVELLO_OBJECT_STORAGE_BUCKET:-grovello}
      GROVELLO_OBJECT_STORAGE_ACCESS_KEY_ID: ${GROVELLO_OBJECT_STORAGE_ACCESS_KEY_ID:-}
      GROVELLO_OBJECT_STORAGE_SECRET_ACCESS_KEY: ${GROVELLO_OBJECT_STORAGE_SECRET_ACCESS_KEY:-}
      GROVELLO_OBJECT_STORAGE_FORCE_PATH_STYLE: ${GROVELLO_OBJECT_STORAGE_FORCE_PATH_STYLE:-true}
      GROVELLO_OBJECT_STORAGE_SSE_MODE: ${GROVELLO_OBJECT_STORAGE_SSE_MODE:-none}
      GROVELLO_OBJECT_STORAGE_KMS_KEY_ID: ${GROVELLO_OBJECT_STORAGE_KMS_KEY_ID:-}
      GROVELLO_OBJECT_STORAGE_CONNECT_TIMEOUT_SECONDS: ${GROVELLO_OBJECT_STORAGE_CONNECT_TIMEOUT_SECONDS:-5}
      GROVELLO_OBJECT_STORAGE_READ_TIMEOUT_SECONDS: ${GROVELLO_OBJECT_STORAGE_READ_TIMEOUT_SECONDS:-30}
      GROVELLO_ASSET_MAX_UPLOAD_BYTES: ${GROVELLO_ASSET_MAX_UPLOAD_BYTES:-104857600}
      GROVELLO_ASSET_UPLOAD_TTL_SECONDS: ${GROVELLO_ASSET_UPLOAD_TTL_SECONDS:-1800}
      GROVELLO_IMPORT_MAX_SOURCE_BYTES: ${GROVELLO_IMPORT_MAX_SOURCE_BYTES:-26214400}
      GROVELLO_IMPORT_UPLOAD_TTL_SECONDS: ${GROVELLO_IMPORT_UPLOAD_TTL_SECONDS:-1800}
      GROVELLO_IMPORT_MAX_ROWS: ${GROVELLO_IMPORT_MAX_ROWS:-10000}
      GROVELLO_IMPORT_MAX_COLUMNS: ${GROVELLO_IMPORT_MAX_COLUMNS:-100}
      GROVELLO_IMPORT_MAX_SCALAR_BYTES: ${GROVELLO_IMPORT_MAX_SCALAR_BYTES:-65536}
      GROVELLO_IMPORT_MAX_JSON_DEPTH: ${GROVELLO_IMPORT_MAX_JSON_DEPTH:-12}
      GROVELLO_IMPORT_PREVIEW_ROWS: ${GROVELLO_IMPORT_PREVIEW_ROWS:-50}
      GROVELLO_ASSET_DOWNLOAD_TTL_SECONDS: ${GROVELLO_ASSET_DOWNLOAD_TTL_SECONDS:-60}
      GROVELLO_ASSET_SCANNER_PROVIDER: ${GROVELLO_ASSET_SCANNER_PROVIDER:-clamav}
      GROVELLO_ASSET_SCANNER_HOST: ${GROVELLO_ASSET_SCANNER_HOST:-malware-scanner}
      GROVELLO_ASSET_SCANNER_PORT: ${GROVELLO_ASSET_SCANNER_PORT:-3310}
      GROVELLO_ASSET_SCANNER_CONNECT_TIMEOUT_SECONDS: ${GROVELLO_ASSET_SCANNER_CONNECT_TIMEOUT_SECONDS:-5}
      GROVELLO_ASSET_SCANNER_TIMEOUT_SECONDS: ${GROVELLO_ASSET_SCANNER_TIMEOUT_SECONDS:-120}
      GROVELLO_ASSET_SCANNER_MAX_STREAM_BYTES: ${GROVELLO_ASSET_SCANNER_MAX_STREAM_BYTES:-104857600}
    command:
      - sh
      - -c
      - >-
        alembic upgrade head &&
        python -m grovello.development_seed &&
        exec uvicorn grovello.main:app --host 0.0.0.0 --port 8000 --proxy-headers
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/system/health')"]
      interval: 10s
      timeout: 5s
      retries: 15
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: services/workers/Dockerfile
    depends_on:
      - temporal
    environment:
      GROVELLO_ENVIRONMENT: development
      GROVELLO_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-grovello}:${POSTGRES_PASSWORD:-grovello}@postgres:5432/${POSTGRES_DB:-grovello}
      GROVELLO_TEMPORAL_ADDRESS: temporal:7233
      GROVELLO_TEMPORAL_NAMESPACE: default
      GROVELLO_TEMPORAL_TASK_QUEUE: grovello-growth
      GROVELLO_OBJECT_STORAGE_ENDPOINT: ${GROVELLO_OBJECT_STORAGE_ENDPOINT:-http://object-storage:9000}
      GROVELLO_OBJECT_STORAGE_PUBLIC_ENDPOINT: ${GROVELLO_OBJECT_STORAGE_PUBLIC_ENDPOINT:-http://localhost:9000}
      GROVELLO_OBJECT_STORAGE_REGION: ${GROVELLO_OBJECT_STORAGE_REGION:-us-east-1}
      GROVELLO_OBJECT_STORAGE_BUCKET: ${GROVELLO_OBJECT_STORAGE_BUCKET:-grovello}
      GROVELLO_OBJECT_STORAGE_ACCESS_KEY_ID: ${GROVELLO_OBJECT_STORAGE_ACCESS_KEY_ID:-}
      GROVELLO_OBJECT_STORAGE_SECRET_ACCESS_KEY: ${GROVELLO_OBJECT_STORAGE_SECRET_ACCESS_KEY:-}
      GROVELLO_OBJECT_STORAGE_FORCE_PATH_STYLE: ${GROVELLO_OBJECT_STORAGE_FORCE_PATH_STYLE:-true}
      GROVELLO_OBJECT_STORAGE_SSE_MODE: ${GROVELLO_OBJECT_STORAGE_SSE_MODE:-none}
      GROVELLO_ASSET_MAX_UPLOAD_BYTES: ${GROVELLO_ASSET_MAX_UPLOAD_BYTES:-104857600}
      GROVELLO_IMPORT_MAX_SOURCE_BYTES: ${GROVELLO_IMPORT_MAX_SOURCE_BYTES:-26214400}
      GROVELLO_IMPORT_UPLOAD_TTL_SECONDS: ${GROVELLO_IMPORT_UPLOAD_TTL_SECONDS:-1800}
      GROVELLO_IMPORT_MAX_ROWS: ${GROVELLO_IMPORT_MAX_ROWS:-10000}
      GROVELLO_IMPORT_MAX_COLUMNS: ${GROVELLO_IMPORT_MAX_COLUMNS:-100}
      GROVELLO_IMPORT_MAX_SCALAR_BYTES: ${GROVELLO_IMPORT_MAX_SCALAR_BYTES:-65536}
      GROVELLO_IMPORT_MAX_JSON_DEPTH: ${GROVELLO_IMPORT_MAX_JSON_DEPTH:-12}
      GROVELLO_IMPORT_PREVIEW_ROWS: ${GROVELLO_IMPORT_PREVIEW_ROWS:-50}
      GROVELLO_ASSET_SCANNER_PROVIDER: ${GROVELLO_ASSET_SCANNER_PROVIDER:-clamav}
      GROVELLO_ASSET_SCANNER_HOST: ${GROVELLO_ASSET_SCANNER_HOST:-malware-scanner}
      GROVELLO_ASSET_SCANNER_PORT: ${GROVELLO_ASSET_SCANNER_PORT:-3310}
      GROVELLO_ASSET_SCANNER_CONNECT_TIMEOUT_SECONDS: ${GROVELLO_ASSET_SCANNER_CONNECT_TIMEOUT_SECONDS:-5}
      GROVELLO_ASSET_SCANNER_TIMEOUT_SECONDS: ${GROVELLO_ASSET_SCANNER_TIMEOUT_SECONDS:-120}
      GROVELLO_ASSET_SCANNER_MAX_STREAM_BYTES: ${GROVELLO_ASSET_SCANNER_MAX_STREAM_BYTES:-104857600}
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: /api/v1
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      GROVELLO_API_BASE_URL: http://api:8000/api/v1
      GROVELLO_ALLOW_DEVELOPMENT_IDENTITY: "true"
      GROVELLO_DEVELOPMENT_SUBJECT: northstar-owner
      GROVELLO_DEVELOPMENT_SESSION: compose-web-session
      GROVELLO_DEVELOPMENT_WORKSPACE_ID: 00000000-0000-4000-8000-000000000001
    restart: unless-stopped

  gateway:
    image: nginx:1.29-alpine
    depends_on:
      - web
      - api
    ports:
      - "8080:8080"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped

volumes:
  postgres_data:
  valkey_data:
