name: grovello-platform

services:
  object-storage:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-grovello}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-this-in-production}
    volumes:
      - object_storage_data:/data
    ports:
      - "9001:9001"
    profiles: ["platform"]

  keycloak:
    image: quay.io/keycloak/keycloak:26.4
    command: start-dev
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-change-this-in-production}
    ports:
      - "8180:8080"
    profiles: ["platform"]

  openfga:
    image: openfga/openfga:v1.10.2
    command: run
    environment:
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DATASTORE_URI: postgres://${POSTGRES_USER:-grovello}:${POSTGRES_PASSWORD:-grovello}@postgres:5432/${POSTGRES_DB:-grovello}?sslmode=disable
      OPENFGA_LOG_FORMAT: json
    ports:
      - "8081:8080"
      - "3001:3000"
    profiles: ["platform"]

  opensearch:
    image: opensearchproject/opensearch:3.4.0
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    ports:
      - "9200:9200"
    profiles: ["scale"]

  clickhouse:
    image: clickhouse/clickhouse-server:25.10-alpine
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    ports:
      - "8123:8123"
    profiles: ["scale"]

  kafka:
    image: apache/kafka:4.1.1
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    profiles: ["scale"]

volumes:
  object_storage_data:
  opensearch_data:
  clickhouse_data:
  kafka_data:
