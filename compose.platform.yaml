services:
  object-storage:
    image: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        test -n "$$MINIO_ROOT_USER" &&
        test -n "$$MINIO_ROOT_PASSWORD" &&
        exec minio server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${GROVELLO_OBJECT_STORAGE_ROOT_USER:-}
      MINIO_ROOT_PASSWORD: ${GROVELLO_OBJECT_STORAGE_ROOT_PASSWORD:-}
      MINIO_API_CORS_ALLOW_ORIGIN: ${GROVELLO_OBJECT_STORAGE_CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://localhost:3200,http://127.0.0.1:3200,http://localhost:8080,http://127.0.0.1:8080}
      MINIO_API_CORS_ALLOW_CREDENTIALS_WITH_WILDCARD: "off"
    volumes:
      - object_storage_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    restart: unless-stopped
    profiles: ["platform"]

  object-storage-init:
    image: quay.io/minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      object-storage:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/opt/grovello/init-object-storage.sh"]
    environment:
      GROVELLO_OBJECT_STORAGE_ENDPOINT: http://object-storage:9000
      GROVELLO_OBJECT_STORAGE_BUCKET: ${GROVELLO_OBJECT_STORAGE_BUCKET:-grovello}
      GROVELLO_OBJECT_STORAGE_ROOT_USER: ${GROVELLO_OBJECT_STORAGE_ROOT_USER:-}
      GROVELLO_OBJECT_STORAGE_ROOT_PASSWORD: ${GROVELLO_OBJECT_STORAGE_ROOT_PASSWORD:-}
      GROVELLO_OBJECT_STORAGE_ACCESS_KEY_ID: ${GROVELLO_OBJECT_STORAGE_ACCESS_KEY_ID:-}
      GROVELLO_OBJECT_STORAGE_SECRET_ACCESS_KEY: ${GROVELLO_OBJECT_STORAGE_SECRET_ACCESS_KEY:-}
    volumes:
      - ./infra/object-storage/init-object-storage.sh:/opt/grovello/init-object-storage.sh:ro
    restart: "no"
    profiles: ["platform"]

  api:
    depends_on:
      object-storage-init:
        condition: service_completed_successfully
        required: false
      malware-scanner:
        condition: service_healthy
        required: false

  worker:
    depends_on:
      malware-scanner:
        condition: service_healthy
        required: false

  malware-scanner:
    image: clamav/clamav:1.4-debian13-slim@sha256:0542880c8abebb7430be5366657aec561f03693ed7be4e64a45fd2ee60b08d02
    volumes:
      - clamav_database:/var/lib/clamav
      - ./infra/clamav/clamd.conf:/etc/clamav/clamd.conf:ro
    restart: unless-stopped
    profiles: ["platform"]

  keycloak:
    image: quay.io/keycloak/keycloak:26.4
    command: start-dev
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-change-this-in-production}
    ports:
      - "8180:8080"
    profiles: ["platform"]

  openfga:
    image: openfga/openfga:v1.10.2
    command: run
    environment:
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DATASTORE_URI: postgres://${POSTGRES_USER:-grovello}:${POSTGRES_PASSWORD:-grovello}@postgres:5432/${POSTGRES_DB:-grovello}?sslmode=disable
      OPENFGA_LOG_FORMAT: json
    ports:
      - "8081:8080"
      - "3001:3000"
    profiles: ["platform"]

  opensearch:
    image: opensearchproject/opensearch:3.4.0
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    ports:
      - "9200:9200"
    profiles: ["scale"]

  clickhouse:
    image: clickhouse/clickhouse-server:25.10-alpine
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    ports:
      - "8123:8123"
    profiles: ["scale"]

  kafka:
    image: apache/kafka:4.1.1
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    profiles: ["scale"]

volumes:
  object_storage_data:
  clamav_database:
  opensearch_data:
  clickhouse_data:
  kafka_data:
